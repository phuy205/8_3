<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Happy Women's Day</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0c1b2b;
    font-family:sans-serif;
}

.container{
    position:relative;
}

/* phong bì */

.envelope{
    position:relative;
    width:300px;
    height:200px;
    background:#f5d7a1;
    cursor:pointer;
    overflow:visible;
}

/* nắp phong bì */

.flap{
    position:absolute;
    top:0;
    left:0;
    width:0;
    height:0;
    border-left:150px solid transparent;
    border-right:150px solid transparent;
    border-bottom:100px solid #f1c27d;
    transform-origin:top;
    transition:0.8s;
}

/* thân phong bì */

.body{
    position:absolute;
    bottom:0;
    width:100%;
    height:150px;
    background:#f5d7a1;
}

/* lá thư */

.letter{
    position:absolute;
    width:260px;
    height:160px;
    background:white;
    left:20px;
    bottom:0;
    border-radius:6px;
    text-align:center;
    padding-top:30px;
    transition:1s;
    z-index:1;
}

/* text */

.text1{
    font-size:18px;
    color:#ff4d6d;
}

.text2{
    opacity:0;
    margin-top:20px;
    font-size:16px;
    color:#444;
    transition:1s;
}

/* khi mở */

.open .flap{
    transform:rotateX(180deg);
}

.open .letter{
    transform:translateY(-120px);
}

.open .text1{
    opacity:0;
}

.open .text2{
    opacity:1;
}

</style>
</head>

<body>

<div class="container">

<div class="envelope" id="envelope">

<div class="flap"></div>

<div class="body"></div>

<div class="letter">

<div class="text1">
Happy Women's Day 💖
</div>

<div class="text2">
Chúc bạn luôn vui vẻ  
và gặp nhiều may mắn 🌸
</div>

</div>

</div>

</div>

<script>

let envelope = document.getElementById("envelope")

envelope.onclick = function(){
    envelope.classList.toggle("open")
}

</script>

</body>
</html>
